<!DOCTYPE html>
<!-- Calculateur de Soudabilité - soudabilite.com
     Conception et développement : Tony SANCHEZ -->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- build:signature Tony SANCHEZ / TS-SDB-2026 -->
    <meta name="author" content="Tony SANCHEZ" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Paramètres & Analyses - saisie des métaux, du procédé et de la géométrie du joint. Calcul automatique de l'intensité, de la tension et de l'énergie de soudage."
    />
    <title data-i18n="parametres.titre">Paramètres &amp; Analyses - Calculateur de Soudabilité</title>

    <!-- Choices.js (combobox à recherche - CLAUDE.md #11), chargé via CDN. -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/styles/choices.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/scripts/choices.min.js"></script>

    <link rel="stylesheet" href="assets/css/main.css" />
    <!-- Fiche imprimable (window.print + @media print - CLAUDE.md #25). -->
    <link rel="stylesheet" href="assets/css/print.css" media="print" />

    <!-- Analytics GoatCounter (RGPD sans bandeau cookies - CLAUDE.md #22). -->
    <script
      data-goatcounter="https://soudabilite.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <script type="module" src="assets/js/parametres.js"></script>
  </head>
  <body>
    <!-- ===================== Barre de navigation ===================== -->
    <header class="topbar">
      <div class="conteneur topbar__inner">
        <a class="nav__marque" href="index.html">www.soudabilite.com</a>
        <nav class="nav" data-i18n-attr="aria-label:nav.aria_label">
          <a class="nav__lien" href="index.html" data-i18n="nav.presentation"></a>
          <a class="nav__lien is-active" href="parametres.html" data-i18n="nav.parametres"></a>
          <a class="nav__lien" href="banque.html" data-i18n="nav.data"></a>
          <a class="nav__lien" href="annonces.html" data-i18n="nav.annonces"></a>
        </nav>
      </div>
    </header>

    <!-- ========================= Contenu ============================= -->
    <main class="page">
      <div class="conteneur parametres">
        <section class="param-intro">
          <h1 class="hero__titre" data-i18n="parametres.titre"></h1>
          <p class="param-intro__texte" data-i18n="parametres.intro"></p>
        </section>

        <div class="param-layout">
          <form class="param-form" id="form-dmos" autocomplete="off">
            <!-- Métaux de base -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="parametres.section_metaux"></h2>
              <div class="form-grid">
                <div class="champ">
                  <label class="champ__label" for="metal-a" data-i18n="parametres.label_metal_a"></label>
                  <select id="metal-a" class="champ__select" data-combobox="metal"></select>
                  <button type="button" class="btn-lien" data-toggle-comp="a" data-i18n="parametres.comp_manuelle_ajouter"></button>
                  <div class="comp-manuelle" data-comp="a" hidden></div>
                  <p class="comp-eq" data-eq="a"></p>
                </div>
                <div class="champ">
                  <label class="champ__label" for="metal-b" data-i18n="parametres.label_metal_b"></label>
                  <select id="metal-b" class="champ__select" data-combobox="metal"></select>
                  <button type="button" class="btn-lien" data-toggle-comp="b" data-i18n="parametres.comp_manuelle_ajouter"></button>
                  <div class="comp-manuelle" data-comp="b" hidden></div>
                  <p class="comp-eq" data-eq="b"></p>
                </div>
                <div class="champ">
                  <label class="champ__label" for="ep-a" data-i18n="parametres.label_epaisseur_a"></label>
                  <input id="ep-a" class="champ__input" type="number" min="0" step="0.1" inputmode="decimal" />
                </div>
                <div class="champ">
                  <label class="champ__label" for="ep-b" data-i18n="parametres.label_epaisseur_b"></label>
                  <input id="ep-b" class="champ__input" type="number" min="0" step="0.1" inputmode="decimal" />
                </div>
              </div>
            </section>

            <!-- Procédé, électrode / consommable et métal d'apport -->
            <!-- Chronologie EE (111) : enrobage → diamètre → puis apport. -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="parametres.section_procede"></h2>
              <div class="form-grid">
                <div class="champ">
                  <label class="champ__label" for="procede" data-i18n="parametres.label_procede"></label>
                  <select id="procede" class="champ__select"></select>
                </div>
                <div class="champ" data-champ="enrobage" hidden>
                  <label class="champ__label" for="enrobage" data-i18n="parametres.label_enrobage"></label>
                  <select id="enrobage" class="champ__select"></select>
                </div>
                <div class="champ" data-champ="diametre" hidden>
                  <label class="champ__label" for="diametre" data-i18n="parametres.label_diametre"></label>
                  <select id="diametre" class="champ__select"></select>
                </div>
                <div class="champ champ--large" data-champ="tungstene" hidden>
                  <label class="champ__label" for="tungstene" data-i18n="parametres.label_tungstene"></label>
                  <select id="tungstene" class="champ__select" data-combobox="tungstene"></select>
                </div>
                <div class="champ" data-champ="diametre-fil" hidden>
                  <label class="champ__label" for="diametre-fil" data-i18n="parametres.label_diametre_fil"></label>
                  <select id="diametre-fil" class="champ__select"></select>
                </div>
                <p class="note champ--large" data-i18n="parametres.apport_analyse_note"></p>
              </div>
            </section>

            <!-- Assemblage -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="parametres.section_joint"></h2>
              <div class="form-grid form-grid--trois">
                <div class="champ">
                  <label class="champ__label" for="position" data-i18n="parametres.label_position"></label>
                  <select id="position" class="champ__select"></select>
                </div>
                <div class="champ">
                  <label class="champ__label" for="assemblage" data-i18n="parametres.label_assemblage"></label>
                  <select id="assemblage" class="champ__select"></select>
                </div>
                <div class="champ">
                  <label class="champ__label" for="chanfrein" data-i18n="parametres.label_chanfrein"></label>
                  <select id="chanfrein" class="champ__select"></select>
                </div>
              </div>
            </section>

            <!-- Intensité et vitesse -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="parametres.section_intensite"></h2>
              <div class="form-grid" data-grid="intensite">
                <div class="champ" data-champ="i-manuel" hidden>
                  <label class="champ__label" for="i-manuel" data-i18n="parametres.label_intensite_manuelle"></label>
                  <input id="i-manuel" class="champ__input" type="number" min="0" step="1" inputmode="numeric" />
                </div>
                <div class="champ">
                  <label class="champ__label" for="vitesse" data-i18n="parametres.label_vitesse"></label>
                  <input id="vitesse" class="champ__input" type="number" min="0" step="0.5" inputmode="decimal" />
                  <p class="note" data-i18n="parametres.vitesse_note"></p>
                </div>
              </div>
              <p class="note" data-note="tig-hetero" hidden data-i18n="parametres.note_tig_hetero"></p>
            </section>

            <!-- Dilution -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="parametres.section_dilution"></h2>
              <p class="note" data-i18n="parametres.dilution_note"></p>
              <div class="form-grid form-grid--trois">
                <div class="champ">
                  <label class="champ__label" for="da" data-i18n="parametres.label_da"></label>
                  <input id="da" class="champ__input" type="number" min="0" max="100" step="1" inputmode="numeric" />
                </div>
                <div class="champ">
                  <label class="champ__label" for="db" data-i18n="parametres.label_db"></label>
                  <input id="db" class="champ__input" type="number" min="0" max="100" step="1" inputmode="numeric" />
                </div>
                <div class="champ">
                  <label class="champ__label" for="dc" data-i18n="parametres.label_dc"></label>
                  <input id="dc" class="champ__input" type="number" min="0" max="100" step="1" inputmode="numeric" />
                </div>
              </div>
              <p class="erreur" data-erreur-dilution hidden data-i18n="parametres.dilution_erreur"></p>
              <p class="note" data-i18n="parametres.dilution_indicative_note"></p>
              <button type="button" class="btn-lien" data-suggestion-dilution data-i18n="parametres.dilution_suggestion_btn"></button>
            </section>
          </form>

          <!-- Résultats (énergie) -->
          <aside class="param-resultats">
            <section class="carte carte--resultats">
              <h2 class="bloc__titre" data-i18n="parametres.section_resultats"></h2>
              <dl class="res">
                <div class="res__ligne">
                  <dt class="res__label" data-i18n="parametres.res_intensite"></dt>
                  <dd class="res__valeur">
                    <span data-res="I">-</span>
                    <span class="res__unite" data-i18n="parametres.unite_a"></span>
                  </dd>
                </div>
                <div class="res__ligne">
                  <dt class="res__label" data-i18n="parametres.res_tension"></dt>
                  <dd class="res__valeur">
                    <span data-res="U">-</span>
                    <span class="res__unite" data-i18n="parametres.unite_v"></span>
                  </dd>
                </div>
                <div class="res__ligne">
                  <dt class="res__label" data-i18n="parametres.res_vitesse"></dt>
                  <dd class="res__valeur">
                    <span data-res="Vs">-</span>
                    <span class="res__unite" data-i18n="parametres.unite_cmmin"></span>
                  </dd>
                </div>
                <div class="res__ligne">
                  <dt class="res__label" data-i18n="parametres.res_en"></dt>
                  <dd class="res__valeur">
                    <span data-res="En">-</span>
                    <span class="res__unite" data-i18n="parametres.unite_kjmm"></span>
                  </dd>
                </div>
                <div class="res__ligne res__ligne--fort">
                  <dt class="res__label" data-i18n="parametres.res_eq"></dt>
                  <dd class="res__valeur">
                    <span data-res="Q">-</span>
                    <span class="res__unite" data-i18n="parametres.unite_kjmm"></span>
                  </dd>
                </div>
                <div class="res__ligne">
                  <dt class="res__label" data-i18n="parametres.res_rendement"></dt>
                  <dd class="res__valeur"><span data-res="k">-</span></dd>
                </div>
              </dl>
              <p class="note" data-i18n="parametres.resultats_note"></p>
            </section>
          </aside>
        </div>

        <!-- ==================== Section Analyse (fusionnée) =============== -->
        <!-- CLAUDE.md #24 : Paramètres et Analyse forment une seule page
             continue. La sélection du métal d'apport C reste un résultat de
             l'analyse Schaeffler (CLAUDE.md étape 5), pas une donnée saisie
             ci-dessus. -->
        <section id="analyse" class="analyse">
          <section class="param-intro">
            <h2 class="hero__titre" data-i18n="analyse.titre"></h2>
            <p class="param-intro__texte" data-i18n="analyse.intro"></p>
          </section>

          <!-- Aucun métal A/B renseigné ci-dessus -->
          <section class="carte carte--form" data-analyse="vide" hidden>
            <p data-i18n="analyse.message_vide"></p>
          </section>

          <div data-analyse="contenu">
            <!-- CARTE 1 - Diagramme de Schaeffler -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="analyse.carte_diagramme"></h2>
              <div class="schaeffler-zone">
                <svg id="schaeffler" class="schaeffler-svg" role="img" aria-label="Diagramme de Schaeffler"></svg>
              </div>
              <ul class="legende">
                <li><span class="legende__pastille lg-a"></span><span data-i18n="analyse.leg_a"></span></li>
                <li><span class="legende__pastille lg-b"></span><span data-i18n="analyse.leg_b"></span></li>
                <li><span class="legende__pastille legende__pastille--carre lg-d"></span><span data-i18n="analyse.leg_dmelange"></span></li>
                <li><span class="legende__pastille lg-c"></span><span data-i18n="analyse.leg_c"></span></li>
                <li><span class="legende__pastille legende__pastille--triangle lg-j"></span><span data-i18n="analyse.leg_joint"></span></li>
                <li><span class="legende__pastille lg-id"></span><span data-i18n="analyse.leg_ideale"></span></li>
                <li><span class="legende__pastille lg-ac"></span><span data-i18n="analyse.leg_acceptable"></span></li>
                <li><span class="legende__pastille lg-s"></span><span data-i18n="analyse.leg_zone_s"></span></li>
              </ul>
            </section>

            <!-- CARTE 2 - Sélection des 7 meilleurs apports -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="analyse.carte_apports"></h2>
              <p class="note" data-i18n="analyse.apports_note"></p>
              <div class="tableau-defilant">
                <table class="tableau tableau--apports">
                  <thead>
                    <tr>
                      <th data-i18n="analyse.col_rang"></th>
                      <th data-i18n="analyse.col_designation"></th>
                      <th data-i18n="analyse.col_creq"></th>
                      <th data-i18n="analyse.col_nieq"></th>
                      <th data-i18n="analyse.col_ferrite"></th>
                      <th data-i18n="analyse.col_distance"></th>
                      <th data-i18n="analyse.col_verdict"></th>
                    </tr>
                  </thead>
                  <tbody data-liste="apports"></tbody>
                </table>
              </div>
              <p class="note" data-aide-dilution hidden data-i18n="analyse.aide_dilution"></p>
              <button type="button" class="btn-lien" data-toggle-comp-c aria-expanded="false" data-i18n="analyse.comp_manuelle_c"></button>
              <div class="comp-manuelle" data-comp="c" hidden></div>
            </section>

            <!-- CARTE 3 - Synthèse Schaeffler -->
            <section class="carte carte--form">
              <h2 class="bloc__titre" data-i18n="analyse.carte_synthese"></h2>
              <div data-synth="verdict"></div>
              <div class="tableau-defilant">
                <table class="tableau">
                  <thead>
                    <tr>
                      <th data-i18n="analyse.col_metal"></th>
                      <th data-i18n="analyse.col_creq_s"></th>
                      <th data-i18n="analyse.col_nieq_s"></th>
                      <th data-i18n="analyse.col_creq_d"></th>
                      <th data-i18n="analyse.col_nieq_d"></th>
                      <th data-i18n="analyse.col_creq_w"></th>
                      <th data-i18n="analyse.col_nieq_w"></th>
                    </tr>
                  </thead>
                  <tbody data-synth="valeurs"></tbody>
                </table>
              </div>
              <p class="note" data-i18n="analyse.ferrite_note"></p>
            </section>
          </div>
        </section>

        <!-- ================ Génération de la fiche imprimable ============= -->
        <!-- CLAUDE.md #25 : impression navigateur (window.print + @media
             print), pas de dépendance externe. Le bouton peuple #fiche-
             impression (assets/js/parametres.js) puis déclenche window.print(). -->
        <div class="pdf-action">
          <button type="button" id="btn-pdf" class="btn-primaire" data-i18n="fiche.bouton"></button>
        </div>
      </div>
    </main>

    <!-- ==================== Pied de page permanent =================== -->
    <footer class="pied">
      <div class="conteneur pied__inner">
        <p class="pied__disclaimer" data-i18n="footer.disclaimer"></p>
        <div class="pied__compteurs">
          <p class="pied__compteur" data-compteur hidden></p>
          <p class="pied__compteur" data-compteur-analyses hidden></p>
        </div>
      </div>
    </footer>

    <div class="infobulle" data-infobulle hidden></div>

    <!-- ============ Fiche imprimable (masquée à l'écran) =============== -->
    <!-- Peuplée par remplirFicheImpression() juste avant window.print() ;
         visible uniquement via assets/css/print.css (media print). -->
    <section id="fiche-impression" aria-hidden="true">
      <header class="fiche-entete">
        <h1 data-i18n="fiche.titre"></h1>
        <p class="fiche-meta">
          <span data-i18n="fiche.date"></span> :
          <strong data-fiche="date"></strong>
          &nbsp;&nbsp;-&nbsp;&nbsp;
          <span data-i18n="fiche.repere"></span> : ________________________
        </p>
        <p class="fiche-disclaimer" data-i18n="footer.disclaimer"></p>
      </header>

      <section class="fiche-section">
        <h2 data-i18n="parametres.section_metaux"></h2>
        <table class="fiche-table">
          <thead>
            <tr>
              <th></th>
              <th data-i18n="analyse.col_designation"></th>
              <th data-i18n="parametres.eq_creq"></th>
              <th data-i18n="parametres.eq_nieq"></th>
              <th data-i18n="fiche.col_epaisseur"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th data-i18n="analyse.val_metalA"></th>
              <td data-fiche="a-designation"></td>
              <td data-fiche="a-creq"></td>
              <td data-fiche="a-nieq"></td>
              <td data-fiche="a-epaisseur"></td>
            </tr>
            <tr>
              <th data-i18n="analyse.val_metalB"></th>
              <td data-fiche="b-designation"></td>
              <td data-fiche="b-creq"></td>
              <td data-fiche="b-nieq"></td>
              <td data-fiche="b-epaisseur"></td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="fiche-section">
        <h2 data-i18n="parametres.section_procede"></h2>
        <dl class="fiche-dl">
          <div><dt data-i18n="parametres.label_procede"></dt><dd data-fiche="procede"></dd></div>
          <div><dt data-i18n="parametres.label_tungstene"></dt><dd data-fiche="tungstene"></dd></div>
          <div><dt data-i18n="parametres.label_position"></dt><dd data-fiche="position"></dd></div>
          <div><dt data-i18n="parametres.label_assemblage"></dt><dd data-fiche="assemblage"></dd></div>
          <div><dt data-i18n="parametres.label_chanfrein"></dt><dd data-fiche="chanfrein"></dd></div>
        </dl>
      </section>

      <section class="fiche-section">
        <h2 data-i18n="parametres.section_resultats"></h2>
        <dl class="fiche-dl">
          <div><dt data-i18n="parametres.res_intensite"></dt><dd data-fiche="I"></dd></div>
          <div><dt data-i18n="parametres.res_tension"></dt><dd data-fiche="U"></dd></div>
          <div><dt data-i18n="parametres.res_vitesse"></dt><dd data-fiche="Vs"></dd></div>
          <div><dt data-i18n="parametres.res_en"></dt><dd data-fiche="En"></dd></div>
          <div><dt data-i18n="parametres.res_eq"></dt><dd data-fiche="Q"></dd></div>
          <div><dt data-i18n="parametres.res_rendement"></dt><dd data-fiche="k"></dd></div>
        </dl>
      </section>

      <section class="fiche-section">
        <h2 data-i18n="parametres.section_dilution"></h2>
        <dl class="fiche-dl">
          <div><dt data-i18n="parametres.label_da"></dt><dd data-fiche="dA"></dd></div>
          <div><dt data-i18n="parametres.label_db"></dt><dd data-fiche="dB"></dd></div>
          <div><dt data-i18n="parametres.label_dc"></dt><dd data-fiche="dC"></dd></div>
        </dl>
      </section>

      <section class="fiche-section">
        <h2 data-i18n="fiche.section_apport"></h2>
        <p data-fiche="apport"></p>
      </section>

      <section class="fiche-section fiche-diagramme">
        <h2 data-i18n="analyse.carte_diagramme"></h2>
        <img id="schaeffler-print" alt="Diagramme de Schaeffler" />
      </section>
    </section>
  </body>
</html>

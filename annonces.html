<!DOCTYPE html>
<!-- Calculateur de Soudabilité - soudabilite.com
     Conception et développement : Tony SANCHEZ -->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- build:signature Tony SANCHEZ / TS-SDB-2026 -->
    <meta name="author" content="Tony SANCHEZ" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Suivi des mises à jour du Calculateur de Soudabilité : nouvelles fonctionnalités, version beta en cours de test, contact pour améliorations et corrections."
    />
    <title data-i18n="annonces.titre_onglet_navigateur">Soudabilite.com</title>
    <link rel="canonical" href="https://soudabilite.com/annonces.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Annonces - Calculateur de Soudabilité" />
    <meta
      property="og:description"
      content="Suivi du projet Calculateur de Soudabilité : évolutions prévues, statut beta, contact pour toute suggestion ou signalement d'anomalie."
    />
    <meta property="og:url" content="https://soudabilite.com/annonces.html" />
    <meta property="og:image" content="https://soudabilite.com/assets/img/logo.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <!-- Analytics GoatCounter (RGPD sans bandeau cookies - CLAUDE.md #22). -->
    <script
      data-goatcounter="https://soudabilite.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <script type="module" src="assets/js/app.js"></script>
  </head>
  <body>
    <!-- ===================== Barre de navigation ===================== -->
    <header class="topbar">
      <div class="conteneur topbar__inner">
        <a class="nav__marque" href="index.html">www.soudabilite.com</a>
        <nav class="nav" data-i18n-attr="aria-label:nav.aria_label">
          <a class="nav__lien" href="index.html" data-i18n="nav.presentation"></a>
          <a class="nav__lien" href="parametres.html" data-i18n="nav.parametres"></a>
          <a class="nav__lien" href="banque.html" data-i18n="nav.data"></a>
          <a class="nav__lien is-active" href="annonces.html" data-i18n="nav.annonces"></a>
        </nav>
      </div>
    </header>

    <!-- ========================= Contenu ============================= -->
    <main class="page">
      <div class="conteneur presentation">
        <section class="hero">
          <h1 class="hero__titre" data-i18n="annonces.titre"></h1>
        </section>

        <div class="carte">
          <p class="carte__texte" data-i18n="annonces.intro"></p>
          <p class="carte__texte" data-i18n="annonces.a_venir"></p>
        </div>

        <div class="carte">
          <p class="carte__texte"><span data-i18n="annonces.beta_avant"></span><a href="parametres.html#analyse" data-i18n="annonces.beta_lien"></a><span data-i18n="annonces.beta_apres"></span></p>
        </div>

        <!-- Contact (même lien LinkedIn que l'onglet Présentation) -->
        <section class="auteur">
          <img class="auteur__logo" src="assets/img/logo.png" alt="Logo Soudabilite.com" width="519" height="481" />
          <span class="auteur__nom" data-i18n="presentation.auteur_nom"></span>
          <span data-i18n="presentation.auteur_sep"></span>
          <a
            class="auteur__lien"
            data-i18n="annonces.linkedin"
            data-i18n-attr="href:presentation.linkedin_url"
            target="_blank"
            rel="noopener"
          ></a>
        </section>
      </div>
    </main>

    <!-- ==================== Pied de page permanent =================== -->
    <footer class="pied">
      <div class="conteneur pied__inner">
        <p class="pied__disclaimer" data-i18n="footer.disclaimer"></p>
        <div class="pied__compteurs">
          <p class="pied__compteur" data-compteur hidden></p>
          <p class="pied__compteur" data-compteur-analyses hidden></p>
        </div>
      </div>
    </footer>
  </body>
</html>

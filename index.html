<!DOCTYPE html>
<!-- Calculateur de Soudabilité - soudabilite.com
     Conception et développement : Tony SANCHEZ -->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- build:signature Tony SANCHEZ / TS-SDB-2026 -->
    <meta name="author" content="Tony SANCHEZ" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Calculateur de soudabilité gratuit pour la préparation du DMOS : diagramme de Schaeffler, équivalents chrome/nickel, carbone équivalent IIW, énergie de soudage selon NF EN 1011-1 et NF EN ISO 15609-1."
    />
    <!-- Le titre est piloté par i18n ; ce libellé sert de repli avant JS. -->
    <title data-i18n="app.titre_onglet_navigateur">Soudabilite.com</title>
    <link rel="canonical" href="https://soudabilite.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Calculateur de Soudabilité - Aide à la préparation du DMOS" />
    <meta
      property="og:description"
      content="Outil gratuit pour coordonnateurs en soudage IWE/IWT et étudiants BTS CRCI : diagramme de Schaeffler, équivalents Cr/Ni, carbone équivalent, énergie de soudage."
    />
    <meta property="og:url" content="https://soudabilite.com/" />
    <meta property="og:image" content="https://soudabilite.com/assets/img/logo.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <!-- Analytics GoatCounter (RGPD sans bandeau cookies - CLAUDE.md #22). -->
    <script
      data-goatcounter="https://soudabilite.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <script type="module" src="assets/js/app.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Calculateur de Soudabilité",
      "url": "https://soudabilite.com/",
      "applicationCategory": "EngineeringApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "description": "Outil gratuit d'aide à la préparation du DMOS : diagramme de Schaeffler, carbone équivalent, énergie de soudage.",
      "author": {
        "@type": "Person",
        "name": "Tony SANCHEZ"
      }
    }
    </script>
  </head>
  <body>
    <!-- ===================== Barre de navigation ===================== -->
    <header class="topbar">
      <div class="conteneur topbar__inner">
        <a class="nav__marque" href="index.html">www.soudabilite.com</a>
        <nav class="nav" data-i18n-attr="aria-label:nav.aria_label">
          <a class="nav__lien is-active" href="index.html" data-i18n="nav.presentation"></a>
          <a class="nav__lien" href="parametres.html" data-i18n="nav.parametres"></a>
          <a class="nav__lien" href="banque.html" data-i18n="nav.data"></a>
          <a class="nav__lien" href="annonces.html" data-i18n="nav.annonces"></a>
        </nav>
      </div>
    </header>

    <!-- ========================= Contenu ============================= -->
    <main class="page">
      <div class="conteneur presentation">
        <!-- Hero : titre + sous-titre + description (3-4 lignes) -->
        <section class="hero">
          <h1 class="hero__titre" data-i18n="app.titre"></h1>
          <p class="hero__sous-titre" data-i18n="presentation.sous_titre"></p>
          <p class="note" data-i18n="presentation.beta_note"></p>
          <p class="hero__desc"><span data-i18n="presentation.description_avant"></span><a href="parametres.html#analyse" data-i18n="presentation.description_lien"></a><span data-i18n="presentation.description_apres"></span></p>
        </section>

        <!-- Grille : cadre normatif + sommaire des onglets -->
        <div class="grille-presentation">
          <!-- Tableau des normes (rempli par app.js depuis fr.json) -->
          <section aria-labelledby="titre-normes">
            <h2
              id="titre-normes"
              class="bloc__titre"
              data-i18n="presentation.normes_titre"
            ></h2>
            <table class="normes">
              <thead>
                <tr>
                  <th data-i18n="presentation.normes_col_code"></th>
                  <th data-i18n="presentation.normes_col_objet"></th>
                </tr>
              </thead>
              <tbody data-liste="normes"></tbody>
            </table>
          </section>

          <!-- Sommaire des onglets (rempli par app.js depuis fr.json) -->
          <section aria-labelledby="titre-sommaire">
            <h2
              id="titre-sommaire"
              class="bloc__titre"
              data-i18n="presentation.sommaire_titre"
            ></h2>
            <div class="cartes" data-liste="onglets"></div>
          </section>
        </div>
      </div>
    </main>

    <!-- ==================== Pied de page permanent =================== -->
    <footer class="pied">
      <div class="conteneur pied__inner">
        <p class="pied__disclaimer" data-i18n="footer.disclaimer"></p>
        <div class="pied__compteurs">
          <p class="pied__compteur" data-compteur hidden></p>
          <p class="pied__compteur" data-compteur-analyses hidden></p>
        </div>
      </div>
    </footer>
  </body>
</html>
